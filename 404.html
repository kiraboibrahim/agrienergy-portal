<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>IMEU - AgriEnergy Portal</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // ----------------------------------------------------------------------
      // This script takes the current url and converts the path and query
      // string into just a query string, then redirects the browser to the
      // new url with only a query string and hash fragment.
      // If the project is served under a subdirectory, set pathSegmentsToKeep
      // to the number of segments to keep. E.g. for kiraboibrahim.github.io/farmers-escos-portal
      // it would be 1. Since custom domain agrienergy.online is at the root level, set to 0.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
